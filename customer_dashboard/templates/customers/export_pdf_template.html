<!DOCTYPE html>
<html>
<head>
    <style>
        @page { size: a4 landscape; margin: 1cm; }
        body { font-family: sans-serif; font-size: 10px; }
        h2 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #f2f2f2; border: 1px solid #ccc; padding: 5px; }
        td { border: 1px solid #ccc; padding: 5px; }
        .text-red { color: red; }
    </style>
</head>
<body>
    <h2>Payment Follow-Up Report - {{ today }}</h2>
    <table>
        <thead>
            <tr>
                <th>S.No.</th>
                <th>Customer</th>
                <th>Voucher</th>
                <th>Date</th>
                <th>Credit Status</th>
                <th>Total</th>
                <th>Pending</th>
                <th>Salesperson</th>
            </tr>
        </thead>
        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ row.customer }}</td>
                <td>{{ row.voucher }}</td>
                <td>{{ row.date }}</td>
                <td>{{ row.credit }}</td>
                <td>{{ row.total }}</td>
                <td>{{ row.pending }}</td>
                <td>{{ row.sp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
